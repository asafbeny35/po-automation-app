[pytest]
testpaths =
    api
    e2e
    unit
python_files = test_*.py
python_functions = test_*
addopts = -ra
markers =
    api: HTTP/API tests
    e2e: browser end-to-end tests
    unit: pure logic / manifest / guardrail tests
    sandbox_only: may create data, but only in sandbox
    requires_browser: requires Playwright browser and authenticated storage state
    requires_live_server: requires a running local server
    requires_integrations: touches connected services and should be enabled carefully
    non_destructive: should not mutate persistent state
    destructive: may create/update/delete test data and must be reviewed before execution
