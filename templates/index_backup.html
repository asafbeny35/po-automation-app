<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>הזמנת רכש → Morning</title>
<style>
:root{
  --brand:#ff7d12;
  --bg:#f4f6fa;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --border:#e5e7eb;
  --disabled:#f3f4f6;
  --shadow:0 12px 35px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:24px;
}
.container{
  max-width:1650px;
  margin:auto;
  background:var(--card);
  border-radius:4px;
  padding:28px;
  box-shadow:var(--shadow);
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  margin-bottom:24px;
}
.logo{
  width:170px;
  height:auto;
  object-fit:contain;
}
.title-wrap{
  text-align:left;
}
.title-wrap h1{
  margin:0;
  font-size:34px;
  line-height:1.1;
}
.title-wrap p{
  margin:8px 0 0;
  color:var(--muted);
  font-size:15px;
}
.upload-area{
min-height:280px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;transition:0.25s ease; box-shadow:0 6px 20px rgba(0,0,0,0.06);min-height:180px;transition:0.2s ease;transition:0.2s ease;position:relative;cursor:pointer;
  border:2px dashed var(--border);
  border-radius:4px;
  padding:24px;
  margin-bottom:26px;
}
.file-row{
  display:flex;
  justify-content:flex-start;
  margin-bottom:18px;
}
input[type="file"]{display:none;
  font-size:18px;
}
.top-actions, .bottom-actions{gap:12px;display:flex;justify-content:center;align-items:center;justify-content:center;justify-content:center;
.bottom-actions{display:flex;justify-content:center;align-items:center;justify-content:center;
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}
button{
  border:none;
  border-radius:4px;
  padding:14px 28px;
  cursor:pointer;
  font-weight:800;
  font-size:24px;
  background:var(--brand);
  color:#fff;
  transition:.18s ease;
  box-shadow:0 8px 20px rgba(255,125,18,.18);
}
button:hover{
  transform:translateY(-1px);
  filter:brightness(.98);
}
.section-title{
  font-size:34px;
  font-weight:900;
  margin:8px 0 24px;
}
.hidden{display:none !important}

#fields{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:22px;
  align-items:start;
}

.field-card{
  background:#fafbfc;
  border:1px solid var(--border);
  border-radius:4px;
  padding:16px 18px 18px;
  min-width:0;
}
.field-card.wide{
  grid-column:span 2;
}
.field-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:12px;
}
.field-label{
  font-size:20px;
  font-weight:800;
  color:#243041;
  line-height:1.2;
}
.field-edit{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:15px;
  font-weight:600;
  flex-shrink:0;
}
.field-edit input{
  width:18px;
  height:18px;
  cursor:pointer;
}
.field-input{
  width:100%;
  padding:16px 18px;
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--disabled);
  color:#111827;
  font-size:20px;
  height:58px;
  outline:none;
}
.field-input.enabled{
  background:#fff;
}
.field-input.wide{
  min-height:64px;
}
.bottom-actions{display:flex;justify-content:center;align-items:center;justify-content:center;
  margin-top:30px;
}

@media (max-width:1300px){
  #fields{grid-template-columns:repeat(2, minmax(0, 1fr));}
}
@media (max-width:820px){
  #fields{grid-template-columns:1fr;}
  .field-card.wide{grid-column:span 1;}
}
@media (max-width:700px){
  body{padding:10px}
  .container{padding:16px}
  .header{
    flex-direction:column;
    align-items:flex-start;
  }
  .title-wrap{
    text-align:right;
  }
  button{
    width:100%;
    font-size:20px;
    padding:18px 24px;
  }
}

button[disabled] {
  opacity: 0.55;
  cursor: not-allowed;
  filter: grayscale(100%);
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="/static/logo.svg" alt="לוגו בן יעקב פתרונות טקסטיל" class="logo">
    <div class="title-wrap">
      <h1>Morning → הזמנת רכש</h1>
      <p>בדיקה, עריכה, יצירת מסמכים, הורדה ושליחה</p>
    </div>
  </div>

  <div class="upload-area" id="dropZone">
<div id="dropText">
<div style="font-size:54px; margin-bottom:10px;">📤</div>
<div style="font-size:28px; font-weight:700; margin-bottom:6px;">גרור קובץ לכאן</div>
<div style="font-size:18px; color:#6b7280;">או לחץ לבחירה מהמחשב</div>
<div id="fileName" style="margin-top:12px; font-size:15px; color:#111827;"></div>
</div>
<div id="fileName" style="margin-top:10px; font-size:18px; color:#111827;"></div>
</div>
<div style="text-align:center; font-size:20px; color:#6b7280; margin-bottom:10px;">
📦 גרור קובץ לכאן או לחץ לבחירה
</div>
    <div class="file-row">
      <input type="file" id="file">
    </div>
    <div class="top-actions">
      <button onclick="send('sandbox')">הפק סנדבוקס</button>
      <button onclick="send('prod')">הפק אמיתי</button>
    </div>
  </div>

  <div id="resultArea" class="hidden">
    <div id="logBox" style="margin-top:16px; font-size:13px; color:#333;"></div>
<div id="downloadLinks" class="hidden" style="margin-top:16px;"></div>
    <div id="fields"></div>
    <div class="bottom-actions">
      <button id="sendSandboxBtn" disabled onclick="send('sandbox')">צור ושלח סנדבוקס</button>
      <button id="sendProdBtn" disabled onclick="send('prod')">צור ושלח אמיתי</button>
      <button id="sendProdWithTransportBtn" disabled onclick="send('prod_with_transport')">צור אמיתי + משלוח</button>

    </div>

    <div id="sendProgressWrap" class="hidden" style="display:none; margin-top:14px;">
      <div id="sendProgressText" style="margin-bottom:8px; font-size:14px; color:#444;">התהליך רץ, נא להמתין...</div>
      <div style="width:100%; height:14px; background:#e5e5e5; border-radius:4px; overflow:hidden;">
        <div id="sendProgressFill" style="width:0%; height:100%; background:#ff7d12; transition:width 0.25s ease;"></div>
      </div>
    </div>
  </div>
</div>


<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("file");

if (dropZone && fileInput) {

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.style.background = "#fff7ed";
    dropZone.style.borderColor = "#ff7d12";
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.style.background = "";
    dropZone.style.borderColor = "";
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.style.background = "";
    dropZone.style.borderColor = "";

    const files = e.dataTransfer.files;
    if (files.length > 0) {
      fileInput.files = files;
      fileInput.dispatchEvent(new Event("change"));
      
    }
  });

  dropZone.addEventListener("click", () => {
    fileInput.click();
  });

  fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
      const nameEl = document.getElementById("fileName");
      if (nameEl) {
        nameEl.innerText = "✔ " + fileInput.files[0].name;
      }
    }
  });

}
</script>

</body>
<script>
async function send(mode) {
  try {
    const fileInput = document.getElementById("file");
    if (!fileInput.files.length) {
      alert("בחר קובץ קודם");
      return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("mode", mode);

    const res = await fetch("/process", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data || data.error) {
      alert("שגיאה בעיבוד הקובץ");
      return;
    }

    const finalizeRes = await fetch("/finalize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode: mode, data: data })
    });

    const result = await finalizeRes.json();
    console.log(result);

    alert("הפעולה הושלמה");

  } catch (e) {
    console.error(e);
    alert("שגיאה בתהליך");
  }
}
</script>

</html>
